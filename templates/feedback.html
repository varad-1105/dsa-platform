<!DOCTYPE html>
<html>

<head>
<title>Feedback</title>

<style>

body{
font-family:'Segoe UI',sans-serif;
margin:0;
background:linear-gradient(135deg,#dfe9f3,#ffffff);
}

/* NAVBAR */

.navbar{
background:#2c3e50;
padding:15px;
text-align:center;
}

.navbar a{
color:white;
margin:0 15px;
text-decoration:none;
font-size:18px;
}

/* CONTAINER */

.container{
display:flex;
justify-content:center;
align-items:center;
height:85vh;
}

/* CARD */

.card{
background:white;
padding:40px;
width:400px;
border-radius:15px;
box-shadow:0 10px 25px rgba(0,0,0,0.15);
text-align:center;
transition:0.3s;
}

.card:hover{
transform:translateY(-5px);
}

/* TITLE */

h2{
margin-bottom:20px;
color:#2c3e50;
}

/* ⭐ STARS */

.rating{
display:flex;
justify-content:center;
gap:8px;
margin:20px 0;
}

.star{
font-size:35px;
color:#ccc;
cursor:pointer;
transition:0.2s;
}

.star:hover,
.star.active{
color:gold;
transform:scale(1.2);
}

/* TEXTAREA */

textarea{
width:100%;
height:100px;
padding:10px;
border-radius:8px;
border:1px solid #ccc;
font-size:15px;
margin-top:10px;
}

/* BUTTON */

button{
margin-top:20px;
padding:12px 25px;
background:linear-gradient(90deg,#3498db,#2980b9);
color:white;
border:none;
border-radius:8px;
font-size:16px;
cursor:pointer;
transition:0.3s;
}

button:hover{
transform:scale(1.05);
}

/* SUCCESS */

.success{
color:#27ae60;
margin-top:15px;
font-weight:bold;
}

</style>

</head>

<body>

<div class="navbar">
<a href="/">Home</a>
<a href="/problems">Problems</a>
<a href="/dashboard">Dashboard</a>
<a href="/feedback">Feedback</a>
</div>

<div class="container">

<div class="card">

<h2>💬 Share Your Feedback</h2>

<form method="POST">

<div class="rating">

<span class="star" onclick="setRating(1)">★</span>
<span class="star" onclick="setRating(2)">★</span>
<span class="star" onclick="setRating(3)">★</span>
<span class="star" onclick="setRating(4)">★</span>
<span class="star" onclick="setRating(5)">★</span>

</div>

<input type="hidden" name="rating" id="rating-value">

<textarea name="message" placeholder="Tell us what you think..."></textarea>

<button type="submit">Submit 🚀</button>

</form>

{% if success %}
<p class="success">✅ Thanks for your feedback!</p>
{% endif %}

</div>

</div>

<script>

function setRating(value){

document.getElementById("rating-value").value = value;

let stars = document.querySelectorAll(".star");

stars.forEach((star,index)=>{
if(index < value){
star.classList.add("active");
}else{
star.classList.remove("active");
}
});

}

</script>

</body>

</html>
