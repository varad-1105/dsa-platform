<!DOCTYPE html>
<html>

<head>

<title>Problems</title>

<style>

body{
font-family: Arial;
margin:0;
background-color:#f4f6f8;
}

/* NAVBAR */

.navbar{
background:#2c3e50;
padding:15px 30px;
display:flex;
justify-content:space-between;
align-items:center;
}

.nav-left a{
color:white;
margin-right:20px;
text-decoration:none;
font-size:18px;
}

.nav-left a:hover{
color:#1abc9c;
}

/* CONTAINER */

.container{
width:70%;
margin:auto;
margin-top:40px;
}

/* PROBLEM CARD */

.problem{
background:white;
padding:20px;
margin:15px 0;
border-radius:8px;
box-shadow:0 2px 5px rgba(0,0,0,0.1);
display:flex;
justify-content:space-between;
align-items:center;
transition:0.3s;
}

.problem:hover{
background:#eaf2f8;
cursor:pointer;
}

/* LEFT SIDE */

.problem-left{
display:flex;
flex-direction:column;
gap:6px;
}

/* TITLE */

.title{
font-weight:bold;
font-size:16px;
}

/* DESCRIPTION */

.desc{
font-size:13px;
color:#555;
max-width:500px;
}

/* META */

.meta{
display:flex;
gap:10px;
align-items:center;
}

/* DIFFICULTY */

.difficulty{
padding:4px 10px;
border-radius:10px;
font-size:13px;
color:white;
}

.easy{ background:#27ae60; }
.medium{ background:#f39c12; }
.hard{ background:#e74c3c; }

/* TAG */

.tag{
background:#3498db;
color:white;
padding:3px 8px;
border-radius:6px;
font-size:12px;
}

/* LINK */

a{
text-decoration:none;
color:black;
}

</style>

</head>

<body>

<div class="navbar">
<div class="nav-left">
<a href="/">Home</a>
<a href="/learn">Learn</a>
<a href="/problems">Problems</a>
</div>
</div>

<div class="container">

<h2>Top Interview Problems</h2>

{% for q in questions %}

<a href="/question/{{ q.id }}">

<div class="problem">

<div class="problem-left">

<div class="title">
{{ loop.index }}. {{ q.title }}
</div>

<div class="desc">
{{ q.description }}
</div>

<div class="meta">

<span class="difficulty {{ q.difficulty|lower }}">
{{ q.difficulty }}
</span>

<span class="tag">{{ q.topic }}</span>

</div>

</div>

</div>

</a>

{% endfor %}

</div>

</body>
</html>
