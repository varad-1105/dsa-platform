<!DOCTYPE html>
<html>

<head>
<title>{{ q.title }}</title>

<style>

body{
margin:0;
font-family:'Segoe UI', sans-serif;
background:#1e1e1e;
color:#e4e4e4;
}

/* NAVBAR */
.navbar{
background:#2c3e50;
padding:12px 20px;
color:white;
display:flex;
justify-content:space-between;
align-items:center;
font-size:16px;
}

.navbar a{
color:white;
text-decoration:none;
}

/* MAIN */
.main{
display:flex;
height:92vh;
}

/* LEFT PANEL */
.left{
width:50%;
background:#f9fbfd;
color:black;
padding:25px;
overflow-y:auto;
border-right:2px solid #ddd;
}

.left h2{
margin-top:0;
}

/* BADGES */
.badge{
padding:4px 10px;
border-radius:10px;
color:white;
font-size:12px;
margin-right:5px;
}

.easy{background:#27ae60;}
.medium{background:#f39c12;}
.hard{background:#e74c3c;}

.tag{
background:#3498db;
color:white;
padding:4px 8px;
border-radius:6px;
font-size:12px;
margin-right:5px;
}

/* RIGHT PANEL */
.right{
width:50%;
display:flex;
flex-direction:column;
}

/* TOP BAR */
.topbar{
background:#2c3e50;
padding:10px;
display:flex;
gap:10px;
align-items:center;
border-bottom:1px solid #444;
}

/* SELECT */
select{
padding:6px;
border-radius:4px;
border:none;
outline:none;
}

/* BUTTONS */
button{
padding:8px 14px;
border:none;
border-radius:4px;
cursor:pointer;
font-size:14px;
}

.run{background:#27ae60;color:white;}
.run:hover{background:#219150;}

.clear{background:#e74c3c;color:white;}
.clear:hover{background:#c0392b;}

/* EDITOR */
textarea{
flex:1;
background:#1e1e1e;
color:#00ff9c;
border:none;
padding:20px;
font-family:monospace;
font-size:14px;
outline:none;
line-height:1.5;
}

/* OUTPUT */
.output{
background:#000;
color:#00ff9c;
padding:12px;
height:140px;
overflow:auto;
font-family:monospace;
border-top:1px solid #444;
}

</style>

</head>

<body>

<div class="navbar">
<a href="/problems">← Back</a>
<span>{{ q.title }}</span>
</div>

<div class="main">

<!-- LEFT -->
<div class="left">

<h2>{{ q.title }}</h2>

<span class="badge {{ q.difficulty|lower }}">
{{ q.difficulty }}
</span>

<span class="tag">{{ q.topic }}</span>

<hr>

<p style="line-height:1.6;">
{{ q.description }}
</p>

</div>

<!-- RIGHT -->
<div class="right">

<div class="topbar">

<select id="language" onchange="changeTemplate()">
<option value="python">Python</option>
<option value="c">C</option>
<option value="cpp">C++</option>
<option value="java">Java</option>
<option value="csharp">C#</option>
</select>

<button class="run" onclick="runCode()">Run ▶</button>
<button class="clear" onclick="clearCode()">Clear</button>

</div>

<textarea id="code"></textarea>

<div class="output" id="output">
> Output will appear here...
</div>

</div>

</div>

<script>

function changeTemplate(){

let lang = document.getElementById("language").value;
let code = "";

if(lang === "python"){
code = `# Python Template

def solve():
    pass

if __name__ == "__main__":
    solve()
`;
}

else if(lang === "c"){
code = `// C Template

#include <stdio.h>

int main(){
    return 0;
}
`;
}

else if(lang === "cpp"){
code = `// C++ Template

#include <bits/stdc++.h>
using namespace std;

int main(){
    return 0;
}
`;
}

else if(lang === "java"){
code = `// Java Template

public class Main {
    public static void main(String[] args){

    }
}
`;
}

else if(lang === "csharp"){
code = `// C# Template

using System;

class Program {
    static void Main(){

    }
}
`;
}

document.getElementById("code").value = code;
}

function clearCode(){
document.getElementById("code").value = "";
}

function runCode(){

let lang = document.getElementById("language").value;

if(lang !== "python"){
document.getElementById("output").innerText =
"⚠️ Only Python execution supported currently.";
return;
}

let code = document.getElementById("code").value;

fetch("/run-code",{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify({code:code})
})
.then(res=>res.json())
.then(data=>{
document.getElementById("output").innerText = data.results.join("\n");
});

}

changeTemplate();

</script>

</body>
</html>
