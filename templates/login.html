<!DOCTYPE html>
<html>

<head>
<title>Login</title>

<style>

body{
margin:0;
font-family: 'Segoe UI', Arial, sans-serif;
background:linear-gradient(135deg,#2c3e50,#1abc9c);
height:100vh;
display:flex;
}

/* LEFT SIDE */

.left{
flex:1;
color:white;
display:flex;
flex-direction:column;
justify-content:center;
padding:80px;
}

.left h1{
font-size:50px;
margin-bottom:20px;
}

.left p{
font-size:18px;
line-height:1.6;
max-width:450px;
}

.features{
margin-top:40px;
}

.feature{
margin-bottom:15px;
font-size:16px;
}

/* RIGHT SIDE */

.right{
flex:1;
background:white;
display:flex;
justify-content:center;
align-items:center;
}

.container{
width:340px;
}

h2{
text-align:center;
margin-bottom:25px;
color:#2c3e50;
}

input{
width:100%;
padding:12px;
margin:8px 0;
border-radius:6px;
border:1px solid #ccc;
font-size:14px;
}

button{
width:100%;
padding:12px;
background:#3498db;
color:white;
border:none;
border-radius:6px;
font-size:16px;
cursor:pointer;
margin-top:10px;
}

button:hover{
background:#2980b9;
}

.switch{
text-align:center;
margin-top:15px;
font-size:14px;
cursor:pointer;
}

.switch span{
color:#3498db;
font-weight:bold;
}

form{
display:none;
}

#login-form{
display:block;
}

</style>

</head>

<body>

<!-- LEFT SECTION -->

<div class="left">

<h1>DSA Platform</h1>

<p>
Practice the most important DSA problems used in real coding interviews.
Build strong problem-solving skills and track your progress.
</p>

<div class="features">

<div class="feature">✔ 100 Curated Interview Problems</div>

<div class="feature">✔ Interactive Code Editor</div>

<div class="feature">✔ Progress Tracking</div>

<div class="feature">✔ Hints & Optimized Solutions</div>

</div>

</div>


<!-- RIGHT SECTION -->

<div class="right">

<div class="container">

<h2 id="title">Login</h2>

<form id="login-form" method="POST" action="/login-user">

<input type="text" name="username" placeholder="Username" required>

<input type="password" name="password" placeholder="Password" required>

<button type="submit">Login</button>

</form>

<form id="signup-form" method="POST" action="/signup">

<input type="text" name="username" placeholder="Username" required>

<input type="password" name="password" placeholder="Password" required>

<button type="submit">Sign Up</button>

</form>

<div class="switch" onclick="toggleForm()">

<span id="switch-text">Don't have an account? Sign Up</span>

</div>

</div>

</div>


<script>

function toggleForm(){

let login = document.getElementById("login-form")
let signup = document.getElementById("signup-form")
let title = document.getElementById("title")
let text = document.getElementById("switch-text")

if(login.style.display === "none"){

login.style.display = "block"
signup.style.display = "none"
title.innerText = "Login"
text.innerText = "Don't have an account? Sign Up"

}
else{

login.style.display = "none"
signup.style.display = "block"
title.innerText = "Sign Up"
text.innerText = "Already have an account? Login"

}

}

</script>

</body>

</html>
